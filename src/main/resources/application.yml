spring:
  application:
    name: redmuqui-platform-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_SMTP_SSL_TRUST:smtp-relay.brevo.com}
            checkserveridentity: ${MAIL_SMTP_SSL_CHECKSERVERIDENTITY:false}

#  datasource:
#    url: jdbc:postgresql://${DB_HOST:prueba-redmuqui.crxcfp96qlvj.us-east-1.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:redmuqui_dev}
#    username: ${DB_USER:postgree}
#    password: ${DB_PASSWORD:postgree1234}
#    driver-class-name: org.postgresql.Driver

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:redmuqui_dev}
    username: ${DB_USER:redmuqui}
    password: ${DB_PASSWORD:redmuqui}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el esquema; Hibernate solo valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Agrupa la carga de asociaciones LAZY en consultas IN por lotes, en
        # vez de una query por elemento (N+1). Afecta listados de actividades,
        # documentos, proyectos y usuarios.
        default_batch_fetch_size: 25
        jdbc:
          time_zone: America/Lima
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    clean-disabled: true                # En prod NUNCA se ejecuta flyway:clean
    out-of-order: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Lima

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# Configuración de la aplicación
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000        # 15 minutos
    refresh-token-expiration-ms: 604800000    # 7 días
    reset-token-expiration-ms: 900000         # 15 minutos
    issuer: redmuqui-platform
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:a20211704@pucp.edu.pe}
    from-name: ${MAIL_FROM_NAME:redmuqui}
  s3:
    bucket-name: ${S3_BUCKET:redmuqui-files-2026}
  ia:
    # Proveedor de IA activo: "gemini" (por defecto) o "anthropic" (Claude).
    # Cambiar con IA_PROVIDER=anthropic. Solo se instancia el cliente elegido,
    # así no hay ambigüedad de beans LlmClient.
    provider: ${IA_PROVIDER:gemini}
    # Resumen Ejecutivo con IA (Sprint 4 ⑤). La API key NUNCA se versiona: se inyecta
    # por entorno, igual que JWT_SECRET. Sin GEMINI_API_KEY el endpoint devuelve un
    # resumen-plantilla (generadoPorIa=false) en vez de fallar.
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    timeout-ms: ${GEMINI_TIMEOUT_MS:30000}
    # Reintentos ante errores transitorios de Gemini (503 "high demand", red). No aplica a 429.
    max-reintentos: ${GEMINI_MAX_REINTENTOS:2}
    # Proveedor alternativo Claude (Anthropic). Se usa solo con IA_PROVIDER=anthropic.
    # La key (ANTHROPIC_API_KEY) NUNCA se versiona. Sin key, cae a la plantilla.
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1}
      version: ${ANTHROPIC_VERSION:2023-06-01}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:2048}
      timeout-ms: ${ANTHROPIC_TIMEOUT_MS:30000}
      # Reintentos ante errores transitorios (5xx, 529 "overloaded", red). No aplica a 429/401.
      max-reintentos: ${ANTHROPIC_MAX_REINTENTOS:2}
  swagger:
    enabled: ${SWAGGER_ENABLED:false}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET:redmuqui-files-2026}

# Servicio externo de OCR (Django). Si OCR_WEBHOOK_URL está vacío, la
# notificación se omite y el polling de respaldo de Django se encarga.
ocr:
  webhook:
    url: ${OCR_WEBHOOK_URL:}
    token: ${OCR_WEBHOOK_TOKEN:}

# Documentación OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.redmuqui.platform: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
