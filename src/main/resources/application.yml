spring:
  application:
    name: redmuqui-platform-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:redmuqui_dev}
    username: ${DB_USER:redmuqui}
    password: ${DB_PASSWORD:redmuqui}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gestiona el esquema; Hibernate solo valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Agrupa la carga de asociaciones LAZY en consultas IN por lotes, en
        # vez de una query por elemento (N+1). Afecta listados de actividades,
        # documentos, proyectos y usuarios.
        default_batch_fetch_size: 25
        jdbc:
          time_zone: America/Lima
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    clean-disabled: true                # En prod NUNCA se ejecuta flyway:clean
    out-of-order: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Lima

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# Configuración de la aplicación
app:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-debe-ser-largo-y-aleatorio-min-256-bits-AAAAAA}
    access-token-expiration-ms: 900000        # 15 minutos
    refresh-token-expiration-ms: 604800000    # 7 días
    reset-token-expiration-ms: 900000         # 15 minutos
    issuer: redmuqui-platform
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  s3:
    bucket-name: ${S3_BUCKET:redmuqui-files-2026}
  ia:
    # Resumen Ejecutivo con IA (Sprint 4 ⑤). La API key NUNCA se versiona: se inyecta
    # por entorno, igual que JWT_SECRET. Sin GEMINI_API_KEY el endpoint devuelve un
    # resumen-plantilla (generadoPorIa=false) en vez de fallar.
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    timeout-ms: ${GEMINI_TIMEOUT_MS:30000}
    # Reintentos ante errores transitorios de Gemini (503 "high demand", red). No aplica a 429.
    max-reintentos: ${GEMINI_MAX_REINTENTOS:2}

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET:redmuqui-files-2026}

# Documentación OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.redmuqui.platform: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO