# Perfil de desarrollo local
# - Logs verbosos
# - Auth habilitada para validar el flujo real de login/JWT
# - SQL visible en consola
#
# NUNCA usar este perfil en producción.

spring:
  jpa:
    show-sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  s3:
    bucket: ${AWS_S3_BUCKET:dummy-bucket}
    region: ${AWS_REGION:us-east-1}

logging:
  level:
    com.redmuqui.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
