# Perfil de desarrollo local
# - Logs verbosos
# - Auth habilitada para validar el flujo real de login/JWT
# - SQL visible en consola
#
# NUNCA usar este perfil en producción.

spring:
  jpa:
    show-sql: true

app:
  security:
    enabled: false   # Desactiva Spring Security en endpoints (ver SecurityConfig)
    method-enabled: false   # Desactiva @PreAuthorize/@Secured en dev

logging:
  level:
    com.redmuqui.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
